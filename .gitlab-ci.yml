# CI/CD для отдельного репозитория: корень репо = содержимое lab-1/
# Скопируйте в корень как .gitlab-ci.yml
# Секреты: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - build
  - lint
  - test
  - docker
  - publish

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  DOCKER_IMAGE_LOCAL: "lab1-app"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  APP_DIR: "app"

.default_python:
  image: python:3.12-slim
  before_script:
    - cd "$APP_DIR"
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt -r requirements-dev.txt

build:
  extends: .default_python
  stage: build
  script:
    - python -m compileall -q src

lint:
  extends: .default_python
  stage: lint
  script:
    - ruff check .
    - ruff format --check .

test:
  extends: .default_python
  stage: test
  variables:
    PYTHONPATH: "${CI_PROJECT_DIR}/app"
  script:
    - >
      pytest
      --cov=src
      --cov-report=term
      --cov-report=html
      --cov-report=xml
      --cov-fail-under=50
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+\%)$/m'
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - app/htmlcov/
      - app/coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: app/coverage.xml

.docker_job:
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
      command: ["--tls=false"]

docker_build:
  extends: .docker_job
  stage: docker
  needs:
    - build
    - lint
    - test
  script:
    - docker info
    - docker build -f app/Dockerfile -t "${DOCKER_IMAGE_LOCAL}:${CI_COMMIT_SHORT_SHA}" app
    - docker save "${DOCKER_IMAGE_LOCAL}:${CI_COMMIT_SHORT_SHA}" -o image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 2 days

docker_push:
  extends: .docker_job
  stage: publish
  needs:
    - job: docker_build
      artifacts: true
  script:
    - |
      if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
        echo "ERROR: задайте CI-переменные DOCKERHUB_USERNAME и DOCKERHUB_TOKEN."
        exit 1
      fi
    - NAME="${DOCKER_IMAGE_NAME:-lab1-app}"
    - docker load -i image.tar
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - SRC_TAG="${DOCKER_IMAGE_LOCAL}:${CI_COMMIT_SHORT_SHA}"
    - HUB_REF="${DOCKERHUB_USERNAME}/${NAME}"
    - docker tag "$SRC_TAG" "${HUB_REF}:${CI_COMMIT_SHORT_SHA}"
    - docker tag "$SRC_TAG" "${HUB_REF}:${CI_COMMIT_REF_SLUG}"
    - docker push "${HUB_REF}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${HUB_REF}:${CI_COMMIT_REF_SLUG}"
