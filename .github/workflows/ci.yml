# CI/CD для отдельного репозитория: корень репо = содержимое lab-1/
# Скопируйте в .github/workflows/ci.yml
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: CI/CD (Sports Store)

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  DOCKER_IMAGE_LOCAL: lab1-app
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Verify bytecode compile
        run: python -m compileall -q src

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/app
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=term \
            --cov-report=html \
            --cov-report=xml \
            --cov-fail-under=50
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: app/htmlcov/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: app/coverage.xml

  docker_build:
    runs-on: ubuntu-latest
    needs: [build, lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE_LOCAL }}:${{ steps.sha.outputs.short }}
          outputs: type=docker,dest=/tmp/image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  docker_push:
    runs-on: ubuntu-latest
    needs: [docker_build]
    if: >-
      success() && needs.docker_build.result == 'success' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .
      - name: Проверка секретов Docker Hub
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Задайте secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN"
            exit 1
          fi
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Load and push
        run: |
          NAME="${IMAGE_NAME:-lab1-app}"
          docker load -i image.tar
          SHORT_SHA="${GITHUB_SHA:0:7}"
          REF_SLUG="${GITHUB_REF_NAME//\//-}"
          LOCAL_TAG="${{ env.DOCKER_IMAGE_LOCAL }}:${SHORT_SHA}"
          docker tag "$LOCAL_TAG" "${DOCKERHUB_USERNAME}/${NAME}:${SHORT_SHA}"
          docker tag "$LOCAL_TAG" "${DOCKERHUB_USERNAME}/${NAME}:${REF_SLUG}"
          docker push "${DOCKERHUB_USERNAME}/${NAME}:${SHORT_SHA}"
          docker push "${DOCKERHUB_USERNAME}/${NAME}:${REF_SLUG}"
