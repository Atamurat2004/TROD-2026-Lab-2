# Линтер, pytest и coverage для приложения Sports Store (lab-1).
# Команды выполняются из каталога lab-1/app.

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
"src/main.py" = ["B008", "E501"]

[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
fail_under = 50
show_missing = true
